{% extends 'base.html' %}
{% block title %}Verify Code - Car Dealership{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Verify Code</h1>
        <p class="text-sm text-gray-500 mb-6">Enter the 6-digit code sent to your phone.</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Verification Code</label>
                <input type="text" name="code" maxlength="6" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm text-center text-2xl tracking-widest" placeholder="000000">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium text-sm transition">Verify</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-500">
            <a href="{% url 'accounts:otp_send' %}" class="text-blue-600 hover:text-blue-800">Request new code</a>
        </p>
    </div>
</div>
{% endblock %}
