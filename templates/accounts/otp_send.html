{% extends 'base.html' %}
{% block title %}Login - Car Dealership{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome</h1>
        <p class="text-sm text-gray-500 mb-6">Enter your phone number to receive a verification code.</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="text" name="phone" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm" placeholder="0712345678">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium text-sm transition">Send Code</button>
        </form>
    </div>
</div>
{% endblock %}
