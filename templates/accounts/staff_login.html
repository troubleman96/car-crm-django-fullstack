{% extends 'base.html' %}
{% block title %}Staff Login - Car Dealership{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">Staff Login</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="text-sm text-red-600 bg-red-50 px-4 py-3 rounded-lg border border-red-200">{{ form.non_field_errors.0 }}</div>
            {% endif %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="text" name="phone" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm" placeholder="+255712345678">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm" placeholder="Enter your password">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium text-sm transition">Login</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-500">
            <a href="/" class="text-blue-600 hover:text-blue-800">Back to home</a>
        </p>
    </div>
</div>
{% endblock %}
